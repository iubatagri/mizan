<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --dash-bg:  #151b2b;
  --dash-panel: #1b2438;
  --body-bg:  #f3f4f6;
  --card-bg:  #ffffff;
  
  --emerald:  #2dd4bf;
  --emerald2: #14b8a6;
  --blue:     #3b82f6;
  --orange:   #f97316;
  --yellow:   #fde047;
  --yellow-text: #854d0e;
  
  --text-main: #1f2937;
  --text-mut:  #6b7280;
  
  --done-bg:  #dcfce7;
  --done-fg:  #16a34a;
  --done-border: #86efac;

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--dash-bg);
  color: #fff;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── SETUP SCREEN ─── */
#setup-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.setup-shell { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 0; }
.setup-headline { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1.15; margin-bottom: 6px; }
.setup-sub { font-size: 0.88rem; color: rgba(255,255,255,0.6); margin-bottom: 32px; line-height: 1.6; }

.setup-card {
  background: var(--dash-panel);
  border-radius: 20px;
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.field-group { display: flex; flex-direction: column; gap: 8px; }
.field-group label { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.05em; }

.preset-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.preset-btn {
  padding: 8px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  transition: 0.2s;
}
.preset-btn:hover { background: rgba(255,255,255,0.1); }
.preset-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

input[type="date"], input[type="number"], input[type="text"] {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--sans);
  font-size: 0.95rem;
  color: #fff;
  width: 100%;
  transition: 0.2s;
  outline: none;
  color-scheme: dark;
}
input:focus { border-color: var(--blue); background: rgba(59,130,246,0.1); }

.divider { height: 1px; background: rgba(255,255,255,0.08); }

.cat-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cat-label-row span { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; }
.cat-label-row .cat-count { font-family: var(--mono); color: rgba(255,255,255,0.4); }

#category-list { display: flex; flex-direction: column; gap: 10px; }
.cat-row { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 8px; }
.rm-btn {
  width: 42px; height: 42px;
  border-radius: 10px; border: none;
  background: rgba(239,68,68,0.15); color: #ef4444;
  cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; transition: 0.15s;
}
.rm-btn:hover { background: #ef4444; color: #fff; }

.add-cat {
  padding: 12px; border-radius: 10px;
  border: 1px dashed rgba(255,255,255,0.2);
  background: transparent; color: rgba(255,255,255,0.7);
  font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s;
}
.add-cat:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.4); color: #fff; }

.gen-btn {
  padding: 16px; border-radius: 12px; border: none;
  background: var(--blue); color: #fff;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 14px rgba(59,130,246,0.4);
}
.gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.6); }

/* ─── TRACKER SCREEN ─── */
#tracker-screen { display: none; flex-direction: column; min-height: 100vh; background: var(--body-bg); }

/* Dashboard (Top Dark Area) */
.dashboard-area {
  background: var(--dash-bg);
  color: #fff;
  padding: 24px 20px 30px;
  border-bottom: 1px solid #1e293b;
}

.t-header-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  max-width: 800px; margin: 0 auto 24px;
}
.t-header-left { display: flex; align-items: center; gap: 14px; }
.t-icon {
  width: 48px; height: 48px;
  background: rgba(45,212,191,0.15); color: var(--emerald);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
}
.t-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
.t-started { font-size: 0.85rem; color: rgba(255,255,255,0.5); font-weight: 500; }

.reset-btn {
  padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.15s;
}
.reset-btn:hover { background: rgba(255,255,255,0.1); }

/* Dashboard Panels Grid */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 800px; margin: 0 auto;
}

.dash-box { padding: 20px; background: var(--dash-panel); border-radius: 16px; }

/* Overall & Days Panel */
.overall-row { display: flex; gap: 24px; align-items: center; }
.overall-left { display: flex; align-items: center; gap: 16px; }
.ring-wrap { position: relative; width: 72px; height: 72px; }
.ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
.ring-fill { fill: none; stroke: var(--emerald); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 201; stroke-dashoffset: 201; transition: 0.5s; }
.ring-lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: #fff; }

.overall-text { display: flex; flex-direction: column; }
.o-lbl { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 0.1em; }

.days-stats { display: flex; flex-direction: column; gap: 16px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 24px; }
.day-stat { display: flex; align-items: center; gap: 10px; }
.d-num { font-size: 1.5rem; font-weight: 700; font-family: var(--mono); color: var(--emerald); }
.d-text { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; line-height: 1.3; }

/* Progress Bars */
.prog-title { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 14px; text-transform: uppercase; }
.prog-list { display: flex; flex-direction: column; gap: 14px; }
.prog-item { display: grid; grid-template-columns: 80px 1fr 30px; align-items: center; gap: 12px; }
.p-name { font-size: 0.9rem; font-weight: 600; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-bar-wrap { height: 6px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
.p-bar { height: 100%; border-radius: 4px; transition: 0.4s; }
.p-pct { font-size: 0.85rem; font-family: var(--mono); color: var(--blue); font-weight: 600; text-align: right; }

/* Mini Cal */
.mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.mc-month { font-size: 0.85rem; font-weight: 700; color: #fff; }
.mc-nav { display: flex; gap: 4px; }
.mc-nav button { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; }
.mc-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
.mc-dow { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.3); padding-bottom: 4px; }
.mc-cell { font-size: 0.75rem; font-family: var(--mono); padding: 4px 0; border-radius: 4px; }
.mc-cell.empty { background: transparent; }
.mc-cell.no-plan { color: rgba(255,255,255,0.1); }
.mc-cell.future { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); }
.mc-cell.past { color: var(--emerald); background: rgba(45,212,191,0.1); }
.mc-cell.today { background: var(--orange); color: #fff; font-weight: 700; box-shadow: 0 0 10px rgba(249,115,22,0.4); }

/* Sticky Nav Row */
.nav-row {
  background: var(--card-bg);
  padding: 16px 20px;
  border-bottom: 1px solid #e5e7eb;
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
.nav-lbl { font-size: 0.8rem; font-weight: 700; color: var(--text-mut); letter-spacing: 0.05em; text-transform: uppercase; }
.nav-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.nav-pills::-webkit-scrollbar { height: 0; }
.nav-btn {
  padding: 6px 14px; border-radius: 8px; border: none;
  background: #f1f5f9; color: var(--text-mut);
  font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: var(--mono);
}
.nav-btn.active { background: var(--dash-bg); color: var(--emerald); }

/* Main Tracker Area */
.tracker-content { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; color: var(--text-main); width: 100%; }

.week-section { margin-bottom: 32px; }
.week-header {
  background: var(--dash-panel); color: #fff;
  border-radius: 12px 12px 0 0;
  padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.wh-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
.wh-title span { color: var(--emerald); font-family: var(--mono); font-size: 1.1rem; margin-left: 6px; }
.wh-pct { color: var(--emerald); font-family: var(--mono); font-weight: 700; font-size: 1rem; }

.cards-container {
  background: #e2e8f0; 
  padding: 1px;
  border-radius: 0 0 12px 12px;
  display: flex; flex-direction: column; gap: 1px;
}

.cat-card { background: var(--card-bg); padding: 20px; }
.cat-card:last-child { border-radius: 0 0 11px 11px; }

.cc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.cc-name { font-size: 1.1rem; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
.cc-target { font-size: 0.85rem; color: var(--text-mut); font-weight: 500; }
.cc-top-right { display: flex; align-items: center; gap: 8px; }

/* Remaining Days Circle */
.rem-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(59,130,246,0.1);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(59,130,246,0.3);
  flex-shrink: 0;
}

.pct-chip {
  padding: 4px 12px; border-radius: 99px;
  font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
  background: #fef08a; color: var(--yellow-text); border: 1px solid #fde047;
}
.pct-chip.full { background: var(--done-bg); color: var(--done-fg); border-color: var(--done-border); }
.pct-chip.zero { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; }

/* The Orange Box Design */
.orange-box {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  border: 3px solid var(--orange);
  border-radius: 8px;
  padding: 6px 8px;
  margin-bottom: 10px;
}
.ob-day { text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--text-mut); }

/* Check Buttons */
.checks-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 8px; }
.check-btn-wrap { display: flex; justify-content: center; }
.check-btn {
  width: 100%; aspect-ratio: 1; max-width: 44px;
  border-radius: 10px; border: 2px solid #e5e7eb;
  background: #fff; color: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.15s;
  user-select: none;
}
.check-btn.done { background: var(--done-bg); border-color: var(--done-border); color: var(--done-fg); }
.check-btn.blocked { background: #f1f5f9; border-color: #e2e8f0; color: #cbd5e1; cursor: not-allowed; opacity: 0.6; }
.check-btn:not(.blocked):hover { border-color: var(--emerald); transform: scale(1.05); }

@media (max-width: 640px) {
  .dash-grid { grid-template-columns: 1fr; }
  .setup-card { padding: 20px; }
  .cat-row { grid-template-columns: 1fr 1fr; }
  .cat-row .cd { grid-column: span 2; }
  .cat-row .rm-btn { grid-column: span 2; width: 100%; }
  .orange-box { padding: 4px; gap: 2px; }
  .checks-row { padding: 0 4px; gap: 2px; }
  .check-btn { border-width: 1px; font-size: 1rem; border-radius: 6px; }
}

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--dash-panel); color: #fff; padding: 12px 24px; border-radius: 8px;
  font-size: 0.9rem; font-weight: 600; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-shell">
    <div class="setup-headline">Build your plan.</div>
    <div class="setup-sub">Enter your overall study duration and up to 10 categories with custom day targets.</div>

    <div class="setup-card">
      <div class="field-group">
        <label>Start Date</label>
        <input type="date" id="start-date">
      </div>

      <div class="field-group">
        <label>Overall Duration (Days)</label>
        <div class="preset-btns" id="duration-presets">
          <button class="preset-btn" data-days="7">7d</button>
          <button class="preset-btn" data-days="14">14d</button>
          <button class="preset-btn" data-days="21">21d</button>
          <button class="preset-btn" data-days="90">90d</button>
          <button class="preset-btn active" data-days="custom">Custom</button>
        </div>
        <input type="number" id="total-days" min="7" max="365" placeholder="Total overall days...">
      </div>

      <div class="divider"></div>

      <div>
        <div class="cat-label-row">
          <span>Categories</span>
          <span class="cat-count" id="cat-count">0 / 10</span>
        </div>
        <div id="category-list"></div>
        <button class="add-cat" id="add-cat-btn">＋ Add category</button>
      </div>

      <button class="gen-btn" onclick="generateTracker()">Generate Tracker →</button>
    </div>
  </div>
</div>

<div id="tracker-screen">
  
  <div class="dashboard-area">
    <div class="t-header-top">
      <div class="t-header-left">
        <div class="t-icon">📋</div>
        <div>
          <div class="t-title" id="t-title">7-Day Study Plan</div>
          <div class="t-started" id="t-start-date">Started 16 Jun 2026</div>
        </div>
      </div>
      <button class="reset-btn" onclick="resetTracker()">↩ New</button>
    </div>

    <div class="dash-grid">
      <div class="dash-box">
        <div class="overall-row">
          <div class="overall-left">
            <div class="ring-wrap">
              <svg viewBox="0 0 72 72" class="ring-svg">
                <circle cx="36" cy="36" r="32" class="ring-bg"/>
                <circle cx="36" cy="36" r="32" class="ring-fill" id="ring-arc"/>
              </svg>
              <span class="ring-lbl" id="d-overall">0%</span>
            </div>
            <div class="overall-text"><span class="o-lbl">OVERALL</span></div>
          </div>
          <div class="days-stats">
            <div class="day-stat"><span class="d-num" id="d-passed">0</span><span class="d-text">Days<br>Passed</span></div>
            <div class="day-stat"><span class="d-num" id="d-left">7</span><span class="d-text" style="color:var(--text-mut)">Remaining</span></div>
          </div>
        </div>

        <div style="margin-top:24px;">
          <div class="prog-title">Category Progress</div>
          <div class="prog-list" id="d-cats"></div>
        </div>
      </div>

      <div class="dash-box">
        <div class="mc-header">
          <div class="mc-month" id="mc-month">June 2026</div>
          <div class="mc-nav">
            <button id="mc-prev">&#8249;</button>
            <button id="mc-next">&#8250;</button>
          </div>
        </div>
        <div class="mc-grid" id="mc-grid" style="margin-bottom:20px;"></div>
        
        <div class="prog-title">Weekly Breakdown</div>
        <div class="prog-list" id="d-weeks" style="max-height:110px;overflow-y:auto;padding-right:6px;"></div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <span class="nav-lbl">WEEK</span>
    <div class="nav-pills" id="nav-pills"></div>
  </div>

  <div class="tracker-content" id="tracker-content"></div>

</div>

<div class="toast" id="toast"></div>

<script>
let data = null;

// ── SETUP UI ──────────────────────────────────────────────
const maxCats = 10;
const catList = document.getElementById('category-list');

const _today = new Date();
document.getElementById('start-date').value = _today.toISOString().split('T')[0];

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.onclick = (e) => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const val = e.target.getAttribute('data-days');
    const input = document.getElementById('total-days');
    if (val === 'custom') {
      input.style.display = 'block';
      input.focus();
    } else {
      input.style.display = 'none';
      input.value = val;
    }
  };
});

document.getElementById('add-cat-btn').onclick = () => addCat('','','');
function addCat(name='', target='', days='') {
  if (catList.children.length >= maxCats) return;
  const row = document.createElement('div');
  row.className = 'cat-row';
  row.innerHTML = `
    <input type="text" placeholder="Category name" value="${name}" class="cn">
    <input type="text" placeholder="Target / Chapter" value="${target}" class="ct">
    <input type="number" placeholder="Days" value="${days}" class="cd" min="1" title="Custom target days for this category">
    <button class="rm-btn" title="Remove">✕</button>
  `;
  row.querySelector('.rm-btn').onclick = () => { row.remove(); updateCatCount(); };
  catList.appendChild(row);
  updateCatCount();
}

function updateCatCount() {
  const n = catList.children.length;
  document.getElementById('cat-count').textContent = `${n} / ${maxCats}`;
  document.getElementById('add-cat-btn').style.display = n >= maxCats ? 'none' : 'block';
}

addCat('Botany','Chapter 1', 7);
addCat('Agronomy','Chap 2', 14);
addCat('Soil','Chap 3', 7);

// ── GENERATE ─────────────────────────────────────────────
function generateTracker() {
  const startVal = document.getElementById('start-date').value;
  const totalDays = parseInt(document.getElementById('total-days').value);
  if (!startVal) return toast('Pick a start date');
  if (!totalDays || totalDays < 7) return toast('Minimum 7 days');

  const cats = [];
  let exceedError = false;

  document.querySelectorAll('.cat-row').forEach(r => {
    const n = r.querySelector('.cn').value.trim();
    const t = r.querySelector('.ct').value.trim();
    const d = parseInt(r.querySelector('.cd').value);
    
    // Check if category days exceed overall duration
    if (n && !isNaN(d) && d > totalDays) {
      exceedError = true;
    }
    
    // Assign custom target days; fallback to overall totalDays if left blank
    if (n) cats.push({ name: n, target: t || '—', targetDays: isNaN(d) || d < 1 ? totalDays : d });
  });

  if (exceedError) return toast('Category days cannot exceed overall duration');
  if (!cats.length) return toast('Add at least one category');

  const numWeeks = Math.ceil(totalDays / 7);
  const weeks = Array.from({ length: numWeeks }, (_, i) => ({
    wk: i + 1,
    rows: cats.map((c, catIdx) => ({ section: c.name, target: c.target, catIdx: catIdx, days: Array(7).fill(false) }))
  }));

  data = { startDate: startVal, totalDays, categories: cats, weeks };
  save(); render();
}

// ── RENDER ───────────────────────────────────────────────
let calViewDate = null;
const colors = ['#2dd4bf', '#3b82f6', '#f97316', '#a855f7', '#ec4899', '#eab308'];

function getCatProgress(catIdx) {
  if (!data) return { checked: 0, target: 1, pct: 0 };
  const target = data.categories[catIdx].targetDays;
  const checked = data.weeks.flatMap(w => w.rows.find(r => r.catIdx === catIdx).days).filter(Boolean).length;
  const pct = Math.min(100, Math.round((checked / target) * 100));
  return { checked, target, pct };
}

function render() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('tracker-screen').style.display = 'flex';

  document.getElementById('t-title').textContent = `${data.totalDays}-Day Study Plan`;
  document.getElementById('t-start-date').textContent = `Started ${new Date(data.startDate).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'})}`;

  calViewDate = null;
  buildNav();
  buildCards();
  updateDash();
}

function buildNav() {
  const nav = document.getElementById('nav-pills');
  nav.innerHTML = '';
  data.weeks.forEach((w, i) => {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (i === 0 ? ' active' : '');
    b.textContent = `W${w.wk}`;
    b.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById(`w-sec-${w.wk}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(b);
  });
}

function buildCards() {
  const container = document.getElementById('tracker-content');
  container.innerHTML = '';

  data.weeks.forEach(w => {
    const sec = document.createElement('div');
    sec.className = 'week-section';
    sec.id = `w-sec-${w.wk}`;

    const wPct = calcPct(w.rows.flatMap(r => r.days));
    
    const hdr = document.createElement('div');
    hdr.className = 'week-header';
    hdr.innerHTML = `<div class="wh-title">WEEK <span>${w.wk}</span></div><div class="wh-pct" id="wh-pct-${w.wk}">${wPct}%</div>`;
    sec.appendChild(hdr);

    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'cards-container';

    w.rows.forEach((row, ri) => {
      const card = document.createElement('div');
      card.className = 'cat-card';
      
      const prog = getCatProgress(row.catIdx);
      const chipClass = prog.pct >= 100 ? 'full' : prog.pct > 0 ? '' : 'zero';
      
      let html = `
        <div class="cc-top">
          <div>
            <div class="cc-name">${row.section}</div>
            <div class="cc-target">${row.target}</div>
          </div>
          <div class="cc-top-right">
            <div class="rem-circle rem-circle-cat-${row.catIdx}" title="Remaining Custom Category Days">0</div>
            <div class="pct-chip ${chipClass}" id="chip-w${w.wk}-cat${row.catIdx}">${prog.pct}%</div>
          </div>
        </div>
        <div class="orange-box">
          <div class="ob-day">D1</div><div class="ob-day">D2</div><div class="ob-day">D3</div>
          <div class="ob-day">D4</div><div class="ob-day">D5</div><div class="ob-day">D6</div><div class="ob-day">D7</div>
        </div>
        <div class="checks-row">
      `;
      card.innerHTML = html;
      
      const checksRow = card.querySelector('.checks-row');
      row.days.forEach((done, di) => {
        const wrap = document.createElement('div'); wrap.className = 'check-btn-wrap';
        const btn = document.createElement('div');
        
        let btnClass = 'check-btn';
        if (done) btnClass += ' done';
        else if (prog.checked >= prog.target) btnClass += ' blocked';

        btn.className = btnClass;
        btn.innerHTML = done ? '✓' : '·';
        btn.id = `btn-w${w.wk}-cat${row.catIdx}-d${di}`;
        btn.onclick = () => toggle(w.wk, ri, di, row.catIdx);
        wrap.appendChild(btn);
        checksRow.appendChild(wrap);
      });

      cardsWrap.appendChild(card);
    });

    sec.appendChild(cardsWrap);
    container.appendChild(sec);
  });
}

function updateCategoryUI(catIdx) {
  const prog = getCatProgress(catIdx);
  const chipClass = prog.pct >= 100 ? 'full' : prog.pct > 0 ? '' : 'zero';

  // Update chips and buttons for this category across all weeks
  data.weeks.forEach(w => {
    const chip = document.getElementById(`chip-w${w.wk}-cat${catIdx}`);
    if (chip) {
      chip.textContent = `${prog.pct}%`;
      chip.className = 'pct-chip ' + chipClass;
    }
    
    const row = w.rows.find(r => r.catIdx === catIdx);
    if (row) {
      row.days.forEach((done, di) => {
        const btn = document.getElementById(`btn-w${w.wk}-cat${catIdx}-d${di}`);
        if (btn) {
          let btnClass = 'check-btn';
          if (done) btnClass += ' done';
          else if (prog.checked >= prog.target) btnClass += ' blocked';
          btn.className = btnClass;
          btn.innerHTML = done ? '✓' : '·';
        }
      });
    }
  });
}

function toggle(wk, ri, di, catIdx) {
  const w = data.weeks.find(x => x.wk === wk);
  const isDone = w.rows[ri].days[di];
  const progBefore = getCatProgress(catIdx);
  
  // Prevent selecting new days if target is already reached
  if (!isDone && progBefore.checked >= progBefore.target) {
    toast(`Target of ${progBefore.target} days reached for this category!`);
    return;
  }

  w.rows[ri].days[di] = !isDone;
  
  // Update category-specific UI (chips & blocks)
  updateCategoryUI(catIdx);

  // Update week header %
  const wPct = calcPct(w.rows.flatMap(r => r.days));
  document.getElementById(`wh-pct-${wk}`).textContent = `${wPct}%`;

  save();
  updateDash();
}

function updateDash() {
  // --- DASHBOARD CALENDAR TIME TRACKING ---
  const sd = new Date(data.startDate); sd.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  
  // Count how many real days have passed based on real-world time
  const elapsed = Math.max(0, Math.min(data.totalDays, Math.floor((today - sd) / 86400000)));
  
  document.getElementById('d-passed').textContent = elapsed;
  // Dashboard overall remaining = Total overall days minus days passed in real life
  document.getElementById('d-left').textContent = Math.max(0, data.totalDays - elapsed);

  // --- CATEGORY CUSTOM TARGET TRACKING (Checkmarks based) ---
  let totalTargets = 0;
  let allCompleted = 0;
  const catDiv = document.getElementById('d-cats');
  catDiv.innerHTML = '';

  data.categories.forEach((cat, idx) => {
    // Check how many days the user actually clicked the checkmark for this specific category
    const completedDaysForCat = data.weeks.flatMap(w => w.rows.filter(r => r.catIdx === idx).flatMap(r => r.days)).filter(Boolean).length;
    
    totalTargets += cat.targetDays;
    allCompleted += completedDaysForCat;

    // Update ALL the small circles associated with this category to show: Custom Target - Completed Checks
    const remainingCatDays = Math.max(0, cat.targetDays - completedDaysForCat);
    document.querySelectorAll(`.rem-circle-cat-${idx}`).forEach(el => {
      el.textContent = remainingCatDays;
    });

    // Render Progress Bars for each category
    const p = Math.min(100, Math.round((completedDaysForCat / cat.targetDays) * 100)) || 0; 
    const col = colors[idx % colors.length];
    
    catDiv.innerHTML += `
      <div class="prog-item">
        <span class="p-name">${cat.name}</span>
        <div class="p-bar-wrap"><div class="p-bar" style="width:${p}%; background:${col}"></div></div>
        <span class="p-pct" style="color:${col}">${p}%</span>
      </div>`;
  });

  // Update Overall Ring based on custom target totals vs completed checks
  const globalPct = Math.min(100, Math.round((allCompleted / totalTargets) * 100)) || 0;
  document.getElementById('d-overall').textContent = globalPct + '%';
  const arc = document.getElementById('ring-arc');
  arc.style.strokeDashoffset = 201 - (globalPct / 100) * 201;

  // Render Week Progress Bars
  const wDiv = document.getElementById('d-weeks');
  wDiv.innerHTML = '';
  data.weeks.forEach((w) => {
    const p = calcPct(w.rows.flatMap(r => r.days));
    wDiv.innerHTML += `
      <div class="prog-item">
        <span class="p-name" style="font-family:var(--mono)">W${w.wk}</span>
        <div class="p-bar-wrap"><div class="p-bar" style="width:${p}%; background:var(--blue)"></div></div>
        <span class="p-pct">${p}%</span>
      </div>`;
  });

  buildMiniCal();
}

// ── CALENDAR ─────────────────────────────────────────────
document.getElementById('mc-prev').onclick = () => { calViewDate.setMonth(calViewDate.getMonth() - 1); buildMiniCal(); };
document.getElementById('mc-next').onclick = () => { calViewDate.setMonth(calViewDate.getMonth() + 1); buildMiniCal(); };

function buildMiniCal() {
  if(!data) return;
  const grid = document.getElementById('mc-grid');
  const sd = new Date(data.startDate); sd.setHours(0,0,0,0);
  const ed = new Date(sd); ed.setDate(ed.getDate() + data.totalDays - 1);
  const today = new Date(); today.setHours(0,0,0,0);

  if (!calViewDate) calViewDate = new Date(today.getFullYear(), today.getMonth(), 1);

  const y = calViewDate.getFullYear(), m = calViewDate.getMonth();
  document.getElementById('mc-month').textContent = calViewDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

  grid.innerHTML = '';
  ['S','M','T','W','T','F','S'].forEach(d => {
    grid.innerHTML += `<div class="mc-dow">${d}</div>`;
  });

  const firstDay = new Date(y, m, 1).getDay();
  for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="mc-cell empty"></div>`;

  const daysInMonth = new Date(y, m + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const cDate = new Date(y, m, d); cDate.setHours(0,0,0,0);
    let cls = 'mc-cell';
    if (cDate < sd || cDate > ed) cls += ' no-plan';
    else if (cDate.getTime() === today.getTime()) cls += ' today';
    else if (cDate < today) cls += ' past';
    else cls += ' future';
    
    grid.innerHTML += `<div class="${cls}">${d}</div>`;
  }
}

// ── UTILS ────────────────────────────────────────────────
function calcPct(arr) { return arr.length ? Math.round(arr.filter(Boolean).length / arr.length * 100) : 0; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function save() { localStorage.setItem('strack4', JSON.stringify(data)); } 
function resetTracker() {
  if (!confirm('Clear all progress?')) return;
  localStorage.removeItem('strack4'); data = null;
  document.getElementById('tracker-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// ── INIT ─────────────────────────────────────────────────
try {
  const raw = localStorage.getItem('strack4'); 
  if (raw) { data = JSON.parse(raw); render(); }
} catch {}
</script>
