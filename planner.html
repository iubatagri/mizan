<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Study Planner & Daily Schedule</title>
<style>
/* Core Palette Shared with Main Portal */
:root {
  --primary-deep: #1E3D08;
  --primary-mid: #3B6D11;
  --primary-light: #EAF3DE;
  --accent-green: #76B82A;
  --accent-olive: #97C459;
  --bg-base: #F4F5F0;
  --text-main: #1A1A18;
  --text-muted: #6B6B66;
  --border-color: #E0E0DA;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: transparent; /* Allows main app backdrop blending */
  color: var(--text-main);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Page Section Labels */
.sec-lbl {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 10px;
}

/* Unified Premium Card Matrix */
.card {
  background: #ffffff;
  border: 1px solid var(--border-color);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 1rem;
  padding: 16px;
}

/* Headings */
h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary-deep);
  margin-bottom: 12px;
}

/* Form Fields Matching Ranking Architecture */
input[type=text], input[type=time], select, textarea {
  width: 100%;
  padding: 11px 13px;
  font-size: 15px;
  border: 1.5px solid var(--border-color);
  border-radius: 9px;
  background: #FAFAF8;
  color: var(--text-main);
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  margin-bottom: 12px;
  display: block;
  transition: border-color .2s, background-color .2s;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--primary-mid);
  background: #ffffff;
}

/* Action Buttons */
.btn {
  width: 100%;
  padding: 13px;
  background: var(--primary-mid);
  color: #ffffff;
  border: none;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s;
}

.btn:active {
  background: var(--primary-deep);
}

.btn-secondary {
  background: transparent;
  border: 1.5px solid var(--accent-olive);
  color: var(--primary-mid);
  margin-top: 8px;
}

.btn-secondary:active {
  background: var(--primary-light);
}

/* Planner Layout Grid */
.planner-layout {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Task Row & List Items */
.task-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  background: #FAFAF8;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  margin-bottom: 8px;
}

.task-info {
  display: flex;
  flex-direction: column;
}

.task-title {
  font-weight: 600;
  color: var(--text-main);
}

.task-meta {
  font-size: 12px;
  color: var(--text-muted);
}

.badge-tag {
  font-size: 10px;
  background: var(--primary-light);
  color: var(--primary-deep);
  border-radius: 8px;
  padding: 2px 7px;
  font-weight: 600;
}

/* Progress Bar Integration */
.progress-wrap {
  margin-bottom: 1rem;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: var(--border-color);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary-mid), var(--accent-green));
  width: 0%;
  transition: width 0.5s ease;
}

.empty-state {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 13px;
}
</style>
</head>
<body>

  <div class="planner-layout">
    
    <!-- PROGRESS TRACKER -->
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-header">
          <span>Daily Goals Completed</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- NEW TASK ENGINE -->
    <p class="sec-lbl">Create Study Block</p>
    <div class="card">
      <input type="text" id="task-name" placeholder="Subject name or task topic..." autocomplete="off">
      <div style="display: flex; gap: 8px;">
        <input type="time" id="task-time" style="flex: 1;">
        <select id="task-priority" style="flex: 1;">
          <option value="High">⚠️ Urgent</option>
          <option value="Medium" selected>📅 Normal</option>
          <option value="Low">🌱 Optional</option>
        </select>
      </div>
      <button class="btn" onclick="addStudyTask()">➕ Add to Schedule</button>
    </div>

    <!-- MAIN SCHEDULE VIEW -->
    <p class="sec-lbl">Today's Agenda</p>
    <div class="card" id="task-container">
      <div class="empty-state">No study blocks planned yet. Set some goals above!</div>
    </div>

  </div>

<script>
// Lightweight LocalStorage Engine matching original site paradigms
var tasks = JSON.parse(localStorage.getItem('agri_planner_tasks')) || [];

function saveTasks() {
  localStorage.setItem('agri_planner_tasks', JSON.stringify(tasks));
  renderTasks();
}

function addStudyTask() {
  var name = document.getElementById('task-name').value.trim();
  var time = document.getElementById('task-time').value;
  var priority = document.getElementById('task-priority').value;

  if (!name) return;

  tasks.push({
    id: Date.now(),
    name: name,
    time: time || 'No clear time',
    priority: priority,
    done: false
  });

  document.getElementById('task-name').value = '';
  document.getElementById('task-time').value = '';
  saveTasks();
}

function toggleTask(id) {
  tasks = tasks.map(function(t) {
    if (t.id === id) t.done = !t.done;
    return t;
  });
  saveTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(function(t) { return t.id !== id; });
  saveTasks();
}

function renderTasks() {
  var container = document.getElementById('task-container');
  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty-state">No study blocks planned yet. Set some goals above!</div>';
    updateProgress(0);
    return;
  }

  var h = '';
  var doneCount = 0;

  // Sort tasks by time factor
  tasks.sort(function(a,b){ return a.time.localeCompare(b.time); });

  tasks.forEach(function(t) {
    if (t.done) doneCount++;
    var isChecked = t.done ? 'checked' : '';
    var textStyle = t.done ? 'text-decoration: line-through; color: var(--text-muted);' : '';
    
    h += '<div class="task-item">' +
           '<div style="display: flex; align-items: center; gap: 12px;">' +
             '<input type="checkbox" ' + isChecked + ' onchange="toggleTask(' + t.id + ')" style="width: 18px; height: 18px; accent-color: var(--primary-mid); cursor: pointer;">' +
             '<div class="task-info">' +
               '<span class="task-title" style="' + textStyle + '">' + esc(t.name) + '</span>' +
               '<span class="task-meta">🕒 ' + esc(t.time) + ' &middot; <span class="badge-tag">' + t.priority + '</span></span>' +
             '</div>' +
           '</div>' +
           '<button onclick="deleteTask(' + t.id + ')" style="background: transparent; border: none; color: #991B1B; font-weight: bold; cursor: pointer; padding: 4px 8px;">✕</button>' +
         '</div>';
  });

  container.innerHTML = h;
  updateProgress(Math.round((doneCount / tasks.length) * 100));
}

function updateProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Boot View
window.addEventListener('DOMContentLoaded', renderTasks);
</script>
</body>
</html>
